<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AlliedWork – Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top right, #1a1a1a, #050505);
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    input { font-size: 16px !important; }

    .input-glow:focus {
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm flex flex-col gap-8">
    
    <div class="text-center space-y-2">
      <h1 class="text-5xl font-black italic tracking-tighter text-white uppercase leading-none">
        Allied<span class="text-indigo-500">.</span>Work
      </h1>
    </div>

    <div class="glass-panel rounded-[2.5rem] p-8 shadow-2xl text-center">
      
      <div class="space-y-4">
        <h2 class="text-white text-xs font-black uppercase tracking-widest opacity-50 mb-4">Access Portal</h2>
        
        <div>
          <input type="email" placeholder="Email Address" 
            class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:outline-none input-glow transition-all placeholder:text-zinc-600" />
        </div>

        <div>
          <input type="password" placeholder="Password" 
            class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:outline-none input-glow transition-all placeholder:text-zinc-600" />
        </div>
      </div>

      <!-- This button now triggers the redirect directly -->
      <button onclick="nextpage()" 
        class="w-full mt-8 py-5 rounded-[1.5rem] bg-white text-black text-xs font-black uppercase tracking-[0.2em] hover:bg-zinc-200 active:scale-95 transition-all shadow-lg shadow-white/5">
        Initialize
      </button>

    </div>

    <p class="text-center text-zinc-600 text-[10px] font-medium tracking-wide">
      &copy; 2026 Allied Work Operations. <br/> Access Mode: Guest/Bypass
    </p>
  </div>

  <script>
    function nextpage() {
      // Redirects to your requested dashboard path
      window.location.href = "editor/dashboard.html";
    }
  </script>
</body>
</html>
